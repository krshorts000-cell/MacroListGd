<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ-панель сайта</title>
  <style>
    body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #1e1e2e; color: #cdd6f4; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
    .container, .posts-container { background-color: #181825; padding: 30px; border-radius: 12px; box-shadow: 0 8px 16px rgba(0,0,0,0.3); width: 100%; max-width: 600px; margin-bottom: 20px; box-sizing: border-box; }
    h2 { color: #89b4fa; text-align: center; margin-top: 0; }
    label { display: block; margin-top: 15px; margin-bottom: 5px; font-weight: 600; font-size: 14px; }
    input[type="text"], textarea { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #45475a; background-color: #313244; color: #cdd6f4; font-size: 15px; box-sizing: border-box; }
    input:focus, textarea:focus { outline: none; border-color: #89b4fa; }
    textarea { resize: vertical; min-height: 100px; }
    button { width: 100%; background-color: #89b4fa; color: #11111b; border: none; padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: background-color 0.2s; }
    button:hover { background-color: #b4befe; }
    button:disabled { background-color: #585b70; color: #a6adc8; cursor: not-allowed; }
    #status { margin-top: 15px; text-align: center; font-weight: bold; min-height: 20px; }
    .success { color: #a6e3a1; }
    .error { color: #f38ba8; }
    
    /* Стили карточек */
    .post-card { background-color: #313244; padding: 15px; border-radius: 8px; margin-top: 15px; border-left: 4px solid #89b4fa; }
    .badge-news { font-size: 11px; background-color: #a6e3a1; color: #11111b; padding: 3px 8px; border-radius: 4px; display: inline-block; margin-bottom: 8px; font-weight: bold; }
    .badge-forum { font-size: 11px; background-color: #fab387; color: #11111b; padding: 3px 8px; border-radius: 4px; display: inline-block; margin-bottom: 8px; font-weight: bold; }
    .post-title { font-weight: bold; font-size: 16px; color: #f5e0dc; margin-bottom: 5px; }
    .post-body { font-size: 14px; color: #bac2de; white-space: pre-wrap; margin-bottom: 15px; }
    .post-meta { font-size: 11px; color: #6c7086; margin-bottom: 8px; }
    .btn-group { display: flex; gap: 10px; }
    .btn-edit { background-color: #f9e2af; padding: 8px; margin-top: 0; font-size: 14px; }
    .btn-delete { background-color: #f38ba8; padding: 8px; margin-top: 0; font-size: 14px; }
    
    /* Блок редактирования */
    #editSection { display: none; border: 2px dashed #f9e2af; padding: 15px; border-radius: 8px; margin-bottom: 20px; background-color: #1e1e2e; }
  </style>
</head>
<body>

  <!-- БЛОК РЕДАКТИРОВАНИЯ (появляется при нажатии "Изменить") -->
  <div class="container" id="editSection">
    <h2>✏️ Редактирование записи</h2>
    <input type="hidden" id="editRowId" value="">
    
    <label>Заголовок / Тема треда:</label>
    <input type="text" id="editTitle">
    
    <label>Текст сообщения / новости:</label>
    <textarea id="editBody"></textarea>
    
    <button onclick="saveEdit()" style="background-color: #f9e2af;">💾 Сохранить изменения</button>
    <button onclick="cancelEdit()" style="background-color: #585b70; color: white;">Отмена</button>
  </div>

  <!-- ФОРМА 1: ПУБЛИКАЦИЯ НОВОСТИ -->
  <div class="container">
    <h2>📢 Опубликовать новость</h2>
    <label>Заголовок новости:</label>
    <input type="text" id="newsTitle" placeholder="Например: Обновление сайта...">
    <label>Текст новости:</label>
    <textarea id="newsBody" placeholder="Текст новости..."></textarea>
    <button onclick="sendNews()" style="background-color: #a6e3a1;">Опубликовать новость</button>
  </div>

  <!-- ФОРМА 2: СООБЩЕНИЕ НА ФОРУМ -->
  <div class="container">
    <h2>💬 Написать в тред форума</h2>
    <label>Заголовок треда:</label>
    <input type="text" id="forumTitle" placeholder="Например: thread_114c3h или Первое обсуждение">
    <label>Текст сообщения:</label>
    <textarea id="forumBody" placeholder="Текст сообщения..."></textarea>
    <button onclick="sendForum()">Отправить в тред</button>
  </div>

  <!-- МОДЕРАЦИЯ ВСЕЙ БАЗЫ -->
  <div class="posts-container">
    <h2>📋 Управление записями (Новости и Форум)</h2>
    <button onclick="loadPosts()" style="margin-top: 0; margin-bottom: 15px; background-color: #89b4fa;">🔄 Обновить список</button>
    <div id="postsList">⏳ Загрузка записей...</div>
  </div>
  
  <div id="status" style="margin-bottom: 30px; font-weight: bold;"></div>

  <script>
    // ⚠️ Вставь свою актуальную ссылку /exec сюда
    const API_URL = "https://script.google.com/macros/s/AKfycbyEUOzz3qSGqZjPMSQPkWZY-kjJTOjD-xOLknxRxYaR0hszSI0HKLFu8rYoj1rUv-QM/exec";

    window.onload = loadPosts;

    async function loadPosts() {
      const postsList = document.getElementById('postsList');
      postsList.innerHTML = "⏳ Читаю базу данных...";
      try {
        const response = await fetch(API_URL);
        const result = await response.json();
        
        if (result.status === "success") {
          postsList.innerHTML = "";
          if (result.data.length === 0) {
            postsList.innerHTML = "📭 База данных пуста.";
            return;
          }
          
          result.data.forEach(item => {
            const dateStr = new Date(item.date).toLocaleString('ru-RU');
            const badgeClass = item.type === "Новость" ? "badge-news" : "badge-forum";
            
            postsList.innerHTML += `
              <div class="post-card" id="post-${item.row}">
                <div class="${badgeClass}">${item.type}</div>
                <div class="post-meta">Строка в таблице: ${item.row} | 🕒 ${dateStr}</div>
                <div class="post-title">${item.title}</div>
                <div class="post-body">${item.body}</div>
                <div class="btn-group">
                  <button class="btn-edit" onclick="startEdit(${item.row}, '${escapeJS(item.title)}', '${escapeJS(item.body)}')">✏️ Изменить</button>
                  <button class="btn-delete" onclick="deletePost(${item.row})">🗑 Удалить</button>
                </div>
              </div>
            `;
          });
        }
      } catch (e) {
        postsList.innerHTML = "❌ Ошибка загрузки записей.";
      }
    }

    // Отправка новости
    async function sendNews() {
      const title = document.getElementById('newsTitle').value.trim();
      const body = document.getElementById('newsBody').value.trim();
      if (!title || !body) return showStatus("⚠️ Заполни заголовок и текст новости!", "error");

      const formData = new URLSearchParams();
      formData.append('action', 'add_news');
      formData.append('title', title);
      formData.append('body', body);

      await sendRequest(formData, () => {
        document.getElementById('newsTitle').value = '';
        document.getElementById('newsBody').value = '';
      });
    }

    // Отправка сообщения в тред
    async function sendForum() {
      const title = document.getElementById('forumTitle').value.trim();
      const body = document.getElementById('forumBody').value.trim();
      if (!title || !body) return showStatus("⚠️ Заполни заголовок треда и сообщение!", "error");

      const formData = new URLSearchParams();
      formData.append('action', 'add_forum');
      formData.append('title', title);
      formData.append('body', body);

      await sendRequest(formData, () => {
        document.getElementById('forumTitle').value = '';
        document.getElementById('forumBody').value = '';
      });
    }

    // Редактирование
    function startEdit(row, title, body) {
      document.getElementById('editRowId').value = row;
      document.getElementById('editTitle').value = title;
      document.getElementById('editBody').value = body;
      document.getElementById('editSection').style.display = "block";
      window.scrollTo(0, 0);
    }

    async function saveEdit() {
      const row = document.getElementById('editRowId').value;
      const title = document.getElementById('editTitle').value.trim();
      const body = document.getElementById('editBody').value.trim();
      if (!title) return alert("Заголовок не может быть пустым!");

      const formData = new URLSearchParams();
      formData.append('action', 'edit');
      formData.append('row', row);
      formData.append('title', title);
      formData.append('body', body);

      await sendRequest(formData, () => {
        cancelEdit();
      });
    }

    function cancelEdit() {
      document.getElementById('editSection').style.display = "none";
      document.getElementById('editRowId').value = '';
      document.getElementById('editTitle').value = '';
      document.getElementById('editBody').value = '';
    }

    // Удаление
    async function deletePost(row) {
      if (!confirm("Уверен, что хочешь удалить эту запись?")) return;
      
      const formData = new URLSearchParams();
      formData.append('action', 'delete');
      formData.append('row', row);

      await sendRequest(formData);
    }

    // Универсальная функция запросов
    async function sendRequest(formData, onSuccess) {
      showStatus("⏳ Отправка...", "");
      try {
        const response = await fetch(API_URL, { method: 'POST', body: formData });
        const result = await response.json();
        
        showStatus(result.message, result.status === "success" ? "success" : "error");
        if (result.status === "success") {
          loadPosts();
          if (onSuccess) onSuccess();
        }
      } catch (e) {
        showStatus("❌ Ошибка сети", "error");
      }
    }

    function showStatus(text, type) {
      const statusDiv = document.getElementById('status');
      statusDiv.innerText = text;
      statusDiv.className = type;
    }

    function escapeJS(str) {
      return str.replace(/'/g, "\\'").replace(/"/g, '\\"').replace(/\n/g, '\\n');
    }
  </script>
</body>
</html>
