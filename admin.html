<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Админ-панель</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #1e1e2e;
      color: #cdd6f4;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }
    .container {
      background-color: #181825;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 8px 16px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 500px;
      margin-top: 20px;
    }
    h2 { color: #89b4fa; text-align: center; margin-top: 0; }
    label { display: block; margin-top: 15px; margin-bottom: 5px; font-weight: 600; font-size: 14px; }
    input[type="text"], input[type="number"], textarea {
      width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #45475a;
      background-color: #313244; color: #cdd6f4; font-size: 15px; box-sizing: border-box;
    }
    input:focus, textarea:focus { outline: none; border-color: #89b4fa; }
    textarea { resize: vertical; min-height: 150px; }
    button {
      width: 100%; background-color: #89b4fa; color: #11111b; border: none;
      padding: 14px; border-radius: 8px; font-size: 16px; font-weight: bold;
      cursor: pointer; margin-top: 25px; transition: background-color 0.2s;
    }
    button:hover { background-color: #b4befe; }
    button:disabled { background-color: #585b70; color: #a6adc8; cursor: not-allowed; }
    #status { margin-top: 15px; text-align: center; font-weight: bold; min-height: 20px; }
    .success { color: #a6e3a1; }
    .error { color: #f38ba8; }
  </style>
</head>
<body>
  <div class="container">
    <h2>🚀 Админ-панель базы</h2>
    
    <label>Заголовок (1-я строка):</label>
    <input type="text" id="title" placeholder="Например: Arshadow поставил 69%...">
    
    <label>Основной текст (Ссылки, эмодзи, всё что угодно):</label>
    <textarea id="body" placeholder="Вставь сюда текст, ссылку на YouTube и т.д."></textarea>
    
    <label>Количество записей в таблицу:</label>
    <input type="number" id="count" value="1" min="1">
    
    <button id="submitBtn" onclick="sendData()">Отправить в таблицу</button>
    <div id="status"></div>
  </div>

  <script>
    // СЮДА ВСТАВЬ СВОЮ ССЫЛКУ /exec ИЗ GOOGLE APPS SCRIPT
    const API_URL = "ТВОЯ_ССЫЛКА_EXEC_СЮДА";

    async function sendData() {
      const btn = document.getElementById('submitBtn');
      const statusDiv = document.getElementById('status');
      const title = document.getElementById('title').value.trim();
      const bodyText = document.getElementById('body').value.trim();
      const count = parseInt(document.getElementById('count').value) || 1;

      statusDiv.innerText = '';
      statusDiv.className = '';

      if (!title) {
        statusDiv.innerText = '⚠️ Укажи хотя бы заголовок!';
        statusDiv.className = 'error';
        return;
      }

      btn.innerText = '⏳ Записываю...';
      btn.disabled = true;

      // Упаковываем данные для безопасной отправки
      const formData = new URLSearchParams();
      formData.append('title', title);
      formData.append('body', bodyText);
      formData.append('count', count);

      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          body: formData
        });
        
        const result = await response.json();

        if (result.status === "success") {
          statusDiv.className = 'success';
          statusDiv.innerText = result.message;
          // Очищаем форму после успешной отправки
          document.getElementById('title').value = '';
          document.getElementById('body').value = '';
          document.getElementById('count').value = '1';
        } else {
          statusDiv.className = 'error';
          statusDiv.innerText = result.message;
        }
      } catch (error) {
        statusDiv.className = 'error';
        statusDiv.innerText = '❌ Ошибка сети: не удалось связаться с таблицей.';
      } finally {
        btn.innerText = 'Отправить в таблицу';
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
