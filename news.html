<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacroList | Новости</title>
    <!-- Подключаем современный шрифт Inter (как на главной) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #0a0a0a;
            --text-main: #ffffff;
            --text-muted: #888888;
            --accent-purple: #b026ff;
            --accent-purple-glow: rgba(176, 38, 255, 0.2);
            --accent-cyan: #00f0ff;
            --accent-cyan-glow: rgba(0, 240, 255, 0.15);
            --card-bg: rgba(20, 20, 20, 0.6);
            --card-border: rgba(255, 255, 255, 0.08);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
        }

        /* === ШАПКА / НАВИГАЦИЯ === */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 40px;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--card-border);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 1px;
            color: var(--text-main);
            text-decoration: none;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            align-items: center;
        }

        .nav-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
            transition: color 0.2s;
        }

        .nav-links a:hover, .nav-links a.active {
            color: var(--text-main);
        }

        .btn-outline {
            border: 1px solid var(--accent-purple);
            background: transparent;
            color: var(--text-main);
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
        }

        .btn-outline:hover {
            box-shadow: 0 0 15px var(--accent-purple-glow);
            background: rgba(176, 38, 255, 0.1);
        }

        /* === ОСНОВНОЙ КОНТЕНТ === */
        main {
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            padding: 40px 20px;
            flex: 1;
        }

        .page-title {
            font-size: 36px;
            font-weight: 600;
            margin-bottom: 40px;
            text-align: center;
            background: linear-gradient(90deg, #fff, #aaa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* === КАРТОЧКИ НОВОСТЕЙ === */
        #news-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .news-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            padding: 30px;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .news-card:hover {
            transform: translateY(-3px);
            border-color: rgba(176, 38, 255, 0.4);
            box-shadow: 0 10px 30px -10px var(--accent-purple-glow);
        }

        .news-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .news-tag {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* Цвета для разных категорий */
        .tag-update { background: var(--accent-cyan-glow); color: var(--accent-cyan); border: 1px solid rgba(0,240,255,0.3); }
        .tag-announcement { background: var(--accent-purple-glow); color: #d685ff; border: 1px solid rgba(176,38,255,0.3); }
        .tag-community { background: rgba(255, 170, 0, 0.1); color: #ffaa00; border: 1px solid rgba(255,170,0,0.3); }
        .tag-default { background: rgba(255, 255, 255, 0.05); color: #ccc; border: 1px solid rgba(255,255,255,0.1); }

        .news-date {
            color: var(--text-muted);
            font-size: 14px;
        }

        .news-title {
            font-size: 24px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 16px;
            line-height: 1.3;
        }

        .news-body {
            color: #b0b0b0;
            line-height: 1.6;
            font-size: 16px;
            white-space: pre-wrap; /* Сохраняет абзацы из формы */
        }

        /* Лоадер */
        #loader {
            text-align: center;
            color: var(--text-muted);
            font-size: 18px;
            margin-top: 50px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        /* Адаптив под мобилки */
        @media (max-width: 768px) {
            header { padding: 20px; flex-direction: column; gap: 15px; }
            .nav-links { flex-wrap: wrap; justify-content: center; gap: 15px; }
            .news-card { padding: 20px; }
            .news-title { font-size: 20px; }
        }
    </style>
</head>
<body>

    <!-- ШАПКА -->
    <header>
        <a href="index.html" class="logo">MACROLIST</a>
        <div class="nav-links">
            <a href="index.html">Каталог</a>
            <a href="forum.html">Обсуждение</a>
            <a href="news.html" class="active">Новости</a>
            <a href="download.html">Скачать xdBot</a>
            <a href="submit.html" class="btn-outline">Предложить макрос</a>
        </div>
    </header>

    <main>
        <h1 class="page-title">Новости проекта</h1>
        
        <div id="loader">Загрузка данных...</div>
        <div id="news-container"></div>
    </main>

    <script>
        const NEWS_API_URL = "https://script.google.com/macros/s/AKfycbyKX4AqS-7mubbCqapGQsSLme2Fj5WuSotTBtwZDae1bh6nusEkFdvF0TpuP6TspMEUAQ/exec";

        function getTagClass(category) {
            const catLower = (category || '').toLowerCase();
            if (catLower.includes('update') || catLower.includes('обновлен')) return 'tag-update';
            if (catLower.includes('announcement') || catLower.includes('анонс')) return 'tag-announcement';
            if (catLower.includes('community') || catLower.includes('сообществ')) return 'tag-community';
            return 'tag-default';
        }

        async function loadNews() {
            const loader = document.getElementById('loader');
            const container = document.getElementById('news-container');

            try {
                const res = await fetch(NEWS_API_URL);
                const newsList = await res.json();

                loader.style.display = 'none';

                if (!newsList || newsList.length === 0 || newsList.error) {
                    container.innerHTML = `<div style="text-align: center; color: var(--text-muted); padding: 40px; background: var(--card-bg); border-radius: 16px; border: 1px dashed var(--card-border);">
                        ${newsList.error ? 'Ошибка сервера: ' + newsList.error : 'Лента новостей пока пуста.'}
                    </div>`;
                    return;
                }

                newsList.forEach(item => {
                    const card = document.createElement('div');
                    card.className = 'news-card';
                    
                    const dateObj = new Date(item.date);
                    const dateStr = !isNaN(dateObj) ? dateObj.toLocaleDateString('ru-RU', {
                        day: 'numeric', month: 'long', year: 'numeric', hour: '2-digit', minute:'2-digit'
                    }) : 'Неизвестная дата';

                    const tagClass = getTagClass(item.category);
                    const categoryText = item.category ? item.category.replace(/\[|\]/g, '') : 'НОВОСТЬ';

                    card.innerHTML = `
                        <div class="news-header">
                            <span class="news-tag ${tagClass}">${categoryText}</span>
                            <span class="news-date">${dateStr}</span>
                        </div>
                        <div class="news-title">${item.title || 'Без заголовка'}</div>
                        <div class="news-body">${item.text || ''}</div>
                    `;
                    container.appendChild(card);
                });

            } catch (err) {
                console.error(err);
                loader.innerText = "ОШИБКА ЗАГРУЗКИ. ПРОВЕРЬТЕ ПОДКЛЮЧЕНИЕ.";
                loader.style.color = "red";
            }
        }

        loadNews();
    </script>
</body>
</html>
