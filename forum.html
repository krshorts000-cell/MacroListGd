<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacroList | Анонимный Терминал</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap');

        :root {
            --bg-color: #050505;
            --term-green: #00ff41;
            --term-dark: #003300;
            --term-cyan: #00f0ff;
            --text-muted: #666;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Share Tech Mono', monospace; }
        
        body { background-color: var(--bg-color); color: var(--term-green); display: flex; flex-direction: column; min-height: 100vh; padding: 20px; }
        
        /* Стили скроллбара */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #000; }
        ::-webkit-scrollbar-thumb { background: var(--term-dark); border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--term-green); }

        header { border-bottom: 1px solid var(--term-dark); padding-bottom: 20px; margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; color: var(--term-green); text-decoration: none; text-transform: uppercase; text-shadow: 0 0 10px var(--term-green); }
        .btn { background: transparent; color: var(--term-green); border: 1px solid var(--term-green); padding: 8px 16px; cursor: pointer; font-size: 16px; transition: 0.2s; text-decoration: none; }
        .btn:hover { background: var(--term-green); color: #000; box-shadow: 0 0 15px var(--term-green); }
        
        main { max-width: 900px; width: 100%; margin: 0 auto; flex: 1; }
        
        .sys-msg { color: var(--term-cyan); margin-bottom: 20px; border-left: 2px solid var(--term-cyan); padding-left: 10px; }

        /* СПИСОК ТРЕДОВ */
        #threads-view { display: flex; flex-direction: column; gap: 15px; }
        .thread-card { border: 1px solid var(--term-dark); padding: 15px; background: rgba(0, 255, 65, 0.02); cursor: pointer; transition: 0.2s; }
        .thread-card:hover { border-color: var(--term-green); transform: translateX(5px); }
        .thread-title { font-size: 20px; margin-bottom: 10px; color: #fff; }
        .thread-meta { font-size: 14px; color: var(--text-muted); display: flex; justify-content: space-between; }
        .thread-meta span { color: var(--term-cyan); }

        /* ПРОСМОТР ОДНОГО ТРЕДА */
        #single-thread-view { display: none; flex-direction: column; gap: 20px; }
        .post-card { border: 1px solid var(--term-dark); padding: 15px; }
        .op-post { border-color: var(--term-cyan); background: rgba(0, 240, 255, 0.05); }
        .post-header { display: flex; justify-content: space-between; margin-bottom: 15px; font-size: 14px; border-bottom: 1px dashed var(--term-dark); padding-bottom: 5px; }
        .post-author { color: var(--term-cyan); font-weight: bold; }
        .post-id { color: var(--text-muted); }
        .post-text { color: #ccc; line-height: 1.5; white-space: pre-wrap; }

        .back-btn { margin-bottom: 20px; display: inline-block; color: var(--text-muted); cursor: pointer; }
        .back-btn:hover { color: var(--term-cyan); }

        #loader { text-align: center; color: var(--term-cyan); font-size: 18px; margin-top: 50px; animation: blink 1s infinite; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">MacroList // Terminal</a>
        <button class="btn" onclick="createNewThread()">[+] СОЗДАТЬ ТРЕД</button>
    </header>

    <main>
        <div id="loader">УСТАНОВКА СОЕДИНЕНИЯ С СЕРВЕРОМ...</div>

        <!-- Экран списка тредов -->
        <div id="threads-view">
            <div class="sys-msg">> ЗАГРУЖЕНЫ 5 АКТИВНЫХ ОБСУЖДЕНИЙ. ВЫБЕРИТЕ ТРЕД ДЛЯ ПОДКЛЮЧЕНИЯ.</div>
            <div id="threads-container"></div>
        </div>

        <!-- Экран одного треда -->
        <div id="single-thread-view">
            <div class="back-btn" onclick="showThreadsList()">[< НАЗАД В КАТАЛОГ ТРЕДОВ]</div>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <h2 id="current-thread-title" style="color: #fff;">Загрузка...</h2>
                <button class="btn" id="reply-btn" style="border-color: var(--term-cyan); color: var(--term-cyan);">[>] ОТВЕТИТЬ В ТРЕД</button>
            </div>
            <div id="posts-container" style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;"></div>
        </div>
    </main>

    <script>
        // === ВСТАВЬ СЮДА ССЫЛКУ ИЗ GOOGLE APPS SCRIPT ===
        const API_URL = "ВСТАВЬ_СЮДА_УРЛ_СКРИПТА"; 
        
        // === МАГИЯ ПРЕДЗАПОЛНЕНИЯ (НАСТРОИМ В СЛЕДУЮЩЕМ ШАГЕ) ===
        // Базовая ссылка на Гугл Форму
        const FORM_BASE_URL = "ВСТАВЬ_ССЫЛКУ_НА_ФОРМУ_ЗДЕСЬ"; 
        const ENTRY_THREAD_ID = "entry.123456789"; // ID поля Thread_ID
        const ENTRY_TITLE = "entry.987654321";     // ID поля Заголовок

        let forumData = {}; 

        const threadsView = document.getElementById('threads-view');
        const singleThreadView = document.getElementById('single-thread-view');
        const loader = document.getElementById('loader');

        // Функция парсинга и группировки
        async function loadForum() {
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                loader.style.display = 'none';
                
                if (data.error) {
                    threadsView.innerHTML = `<div style="color: red;">CRITICAL ERROR: ${data.error}</div>`;
                    return;
                }

                // Группируем посты по Thread_ID
                forumData = {};
                data.forEach(post => {
                    if(!post.threadId) return;
                    if(!forumData[post.threadId]) {
                        forumData[post.threadId] = {
                            id: post.threadId,
                            title: 'Безымянный тред',
                            posts: [],
                            lastUpdate: new Date(post.date).getTime()
                        };
                    }
                    forumData[post.threadId].posts.push(post);
                    // Ищем заголовок (обычно он есть у первого поста)
                    if(post.title) forumData[post.threadId].title = post.title;
                    // Обновляем время последней активности
                    const postTime = new Date(post.date).getTime();
                    if(postTime > forumData[post.threadId].lastUpdate) {
                        forumData[post.threadId].lastUpdate = postTime;
                    }
                });

                renderThreadsList();
            } catch (err) {
                console.error(err);
                loader.innerText = "ОШИБКА ПОДКЛЮЧЕНИЯ К БАЗЕ. ДОСТУП ЗАКРЫТ.";
                loader.style.color = "red";
            }
        }

        // Вывод списка топ-5 тредов
        function renderThreadsList() {
            const container = document.getElementById('threads-container');
            container.innerHTML = '';

            // Превращаем объект в массив и сортируем по дате (самые свежие сверху)
            const threadsArray = Object.values(forumData).sort((a, b) => b.lastUpdate - a.lastUpdate);
            
            if(threadsArray.length === 0) {
                container.innerHTML = '<div style="color: var(--text-muted);">БАЗА ДАННЫХ ПУСТА. СТАНЬТЕ ПЕРВЫМ.</div>';
                return;
            }

            // Берем только 5 самых активных
            const topThreads = threadsArray.slice(0, 5);

            topThreads.forEach(thread => {
                const card = document.createElement('div');
                card.className = 'thread-card';
                
                const repliesCount = thread.posts.length - 1; // Вычитаем OP (первый пост)

                card.innerHTML = `
                    <div class="thread-title">${thread.title}</div>
                    <div class="thread-meta">
                        <div>ID: <span>${thread.id}</span></div>
                        <div>ОТВЕТОВ: <span>${repliesCount > 0 ? repliesCount : 0}</span></div>
                    </div>
                `;
                
                card.onclick = () => openThread(thread.id);
                container.appendChild(card);
            });
        }

        // Открытие конкретного треда
        function openThread(threadId) {
            threadsView.style.display = 'none';
            singleThreadView.style.display = 'flex';
            
            const thread = forumData[threadId];
            document.getElementById('current-thread-title').innerText = thread.title;
            
            // Настраиваем кнопку ответа
            document.getElementById('reply-btn').onclick = () => {
                // Создаем ссылку для ответа (Заголовок пустой, ID заполнен)
                const replyUrl = `${FORM_BASE_URL}?${ENTRY_THREAD_ID}=${thread.id}`;
                window.open(replyUrl, '_blank');
            };

            const container = document.getElementById('posts-container');
            container.innerHTML = '';

            thread.posts.forEach((post, index) => {
                const isOp = index === 0; // Первый пост выделяем
                const postDiv = document.createElement('div');
                postDiv.className = `post-card ${isOp ? 'op-post' : ''}`;
                
                const dateStr = new Date(post.date).toLocaleString('ru-RU');

                postDiv.innerHTML = `
                    <div class="post-header">
                        <div class="post-author">${post.author || 'Аноним'} ${isOp ? '[OP]' : ''}</div>
                        <div class="post-id">${dateStr}</div>
                    </div>
                    <div class="post-text">${post.message}</div>
                `;
                container.appendChild(postDiv);
            });
        }

        // Возврат к списку
        function showThreadsList() {
            singleThreadView.style.display = 'none';
            threadsView.style.display = 'flex';
            loadForum(); // Перезагружаем базу, вдруг кто-то ответил
        }

        // Генерация нового треда
        function createNewThread() {
            // Генерируем случайный ID для нового треда (например: thread_x8f9a)
            const newThreadId = 'thread_' + Math.random().toString(36).substr(2, 6);
            
            // Ссылка с предзаполненным ID
            const createUrl = `${FORM_BASE_URL}?${ENTRY_THREAD_ID}=${newThreadId}`;
            window.open(createUrl, '_blank');
        }

        // Запуск
        loadForum();
    </script>
</body>
</html>
