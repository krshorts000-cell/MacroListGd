<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacroList | Обсуждение</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

        :root {
            --bg-color: #050505;
            --surface-color: #121212;
            --text-main: #f0f0f0;
            --text-muted: #888888;
            --neon-primary: #8a2be2;
            --border-color: rgba(255, 255, 255, 0.05);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            border-bottom: 1px solid var(--border-color);
            background: rgba(18, 18, 18, 0.7);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 24px;
            font-weight: 600;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--text-main);
            transition: text-shadow 0.3s ease;
        }

        .logo:hover { text-shadow: 0 0 15px var(--neon-primary); }

        .nav-actions {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .nav-link {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .nav-link:hover, .nav-link.active {
            color: var(--text-main);
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }

        .forum-header-section {
            width: 100%;
            max-width: 800px;
            text-align: center;
            margin-bottom: 40px;
        }

        .forum-title h1 {
            font-size: 36px;
            font-weight: 300;
            margin-bottom: 10px;
        }

        .forum-title p {
            color: var(--text-muted);
            font-size: 15px;
        }

        /* Контейнер для виджета Telegram */
        .tg-comments-container {
            width: 100%;
            max-width: 800px;
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 20px;
            min-height: 400px; /* Чтобы блок не прыгал при загрузке скрипта */
            display: flex;
            flex-direction: column;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">MacroList</a>
        <div class="nav-actions">
            <a href="index.html" class="nav-link">Каталог</a>
            <a href="forum.html" class="nav-link active">Обсуждение</a>
            <a href="submit.html" class="nav-link" style="border: 1px solid var(--neon-primary); padding: 5px 15px; border-radius: 6px;">Предложить макрос</a>
        </div>
    </header>

    <main>
        <div class="forum-header-section">
            <div class="forum-title">
                <h1>Live Обсуждение</h1>
                <p>Авторизуйся через Telegram, чтобы оставить комментарий. Все сообщения синхронизируются с нашим каналом.</p>
            </div>
        </div>

        <div class="tg-comments-container">
            <!-- ============================================== -->
            <!-- ВОТ СЮДА НУЖНО ВСТАВИТЬ СКРИПТ ОТ ТЕЛЕГРАМА    -->
            <!-- ============================================== -->
            
            <script async src="https://t.me/+pYxLQUKt2pM5ZGIy" 
                    data-telegram-discussion="durov/43" 
                    data-comments-limit="10" 
                    data-color="8a2be2" 
                    data-dark="1">
            </script>

            <!-- ============================================== -->
        </div>
    </main>

</body>
</html>
