<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacroList | Обсуждение</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Share+Tech+Mono&display=swap');
        
        :root { 
            --bg-color: #050505; 
            --surface-color: rgba(18, 18, 18, 0.65); 
            --neon-primary: #8a2be2; 
            --neon-terminal: #00f0ff; 
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-color); color: #f5f5f7; min-height: 100vh; }
        
        header { 
            padding: 20px 40px; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .logo { font-size: 24px; font-weight: 600; text-transform: uppercase; text-decoration: none; color: #fff; }
        .nav-actions { display: flex; gap: 20px; }
        .nav-link { color: #999; text-decoration: none; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { color: #fff; }
        
        main { display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        
        /* Кнопки переключения */
        .toggle-container { display: flex; gap: 15px; margin-bottom: 30px; }
        .tab-btn { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid var(--neon-primary); 
            color: #fff; 
            padding: 10px 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: 0.3s; 
        }
        .tab-btn.active { 
            background: var(--neon-primary); 
            box-shadow: 0 0 15px var(--neon-primary); 
        }
        
        /* Контейнеры */
        .tab-content { width: 100%; max-width: 800px; }
        .box { 
            background: var(--surface-color); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255,255,255,0.05); 
            border-bottom: 2px solid rgba(138, 43, 226, 0.4);
            border-radius: 16px; 
            padding: 25px; 
            min-height: 400px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        
        /* Стили терминала */
        #guestbook-form { display: flex; flex-direction: column; gap: 10px; }
        #guestbook-form input, #guestbook-form textarea { 
            background: #000; 
            border: 1px solid #333; 
            color: var(--neon-terminal); 
            padding: 12px; 
            font-family: 'Share Tech Mono', monospace; 
            border-radius: 5px; 
            resize: vertical;
        }
        #submit-btn { 
            background: var(--neon-primary); 
            color: #fff; 
            border: none; 
            padding: 12px; 
            cursor: pointer; 
            font-weight: 600; 
            border-radius: 5px; 
            transition: 0.3s;
        }
        #submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #submit-btn:hover:not(:disabled) { box-shadow: 0 0 10px var(--neon-primary); }
        #status-log { font-family: 'Share Tech Mono', monospace; font-size: 12px; margin-top: 10px; color: #999; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">MacroList</a>
        <div class="nav-actions">
            <a href="index.html" class="nav-link">Каталог</a>
            <a href="forum.html" class="nav-link active">Обсуждение</a>
        </div>
    </header>
    
    <main>
        <!-- Переключатель -->
        <div class="toggle-container">
            <button class="tab-btn active" onclick="switchTab('tg', this)">TELEGRAM ЧАТ</button>
            <button class="tab-btn" onclick="switchTab('term', this)">АНОНИМНЫЙ ТЕРМИНАЛ</button>
        </div>
        
        <!-- Блок Telegram -->
        <div id="tab-tg" class="tab-content">
            <div class="box">
                <script async src="https://telegram.org/js/telegram-widget.js?22" 
                    data-telegram-discussion="macrolist/19" 
                    data-comments-limit="10" 
                    data-color="8a2be2" 
                    data-dark="1">
                </script>
            </div>
        </div>
        
        <!-- Блок Терминал -->
        <div id="tab-term" class="tab-content" style="display: none;">
            <div class="box">
                <form id="guestbook-form">
                    <input type="text" name="nickname" placeholder="Nickname" maxlength="15" required>
                    <textarea name="message" placeholder="Введите сообщение... (можно прикрепить ссылку на imgur)" maxlength="200" required></textarea>
                    <button type="submit" id="submit-btn">ОТПРАВИТЬ ПАКЕТ</button>
                    <div id="status-log">STATUS: READY_TO_SEND</div>
                </form>
            </div>
        </div>
    </main>
    
    <script>
        // Логика переключения вкладок
        function switchTab(tab, btn) {
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tab).style.display = 'block';
            btn.classList.add('active');
        }

        // Логика отправки пакета в Google Таблицу
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzLH51FgbnKygtvU6U3gKcepGvHXrV1QimDWGQ-3Sj3WXCPV2EUy0gxfNeZLuK3Q83e2g/exec";
        const form = document.getElementById('guestbook-form');
        const statusLog = document.getElementById('status-log');
        const submitBtn = document.getElementById('submit-btn');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            submitBtn.disabled = true;
            statusLog.innerText = "STATUS: SENDING_PACKET...";
            statusLog.style.color = "#ffaa00"; // Желтый цвет ожидания
            
            fetch(SCRIPT_URL, { 
                method: 'POST', 
                mode: 'no-cors', // СПАСИТЕЛЬНЫЙ ПАРАМЕТР
                body: new FormData(form) 
            })
            .then(() => {
                // Из-за no-cors браузер не прочитает ответ, но если скрипт не упал, пакет ушел
                statusLog.innerText = "STATUS: PACKET_SENT_SUCCESSFULLY";
                statusLog.style.color = "#00ff00"; // Зеленый цвет успеха
                form.reset();
                
                setTimeout(() => { 
                    statusLog.innerText = "STATUS: READY_TO_SEND"; 
                    statusLog.style.color = "#999"; // Возвращаем серый цвет
                    submitBtn.disabled = false; 
                }, 3500);
            })
            .catch((err) => { 
                console.error(err);
                statusLog.innerText = "STATUS: ERROR_CONNECTION_FAILED"; 
                statusLog.style.color = "#ff0000"; // Красный цвет ошибки
                submitBtn.disabled = false; 
            });
        });
    </script>
</body>
</html>
