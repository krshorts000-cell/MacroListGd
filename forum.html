<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacroList | Обсуждение</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Share+Tech+Mono&display=swap');
        
        :root { 
            --bg-color: #050505; 
            --surface-color: rgba(18, 18, 18, 0.65); 
            --neon-primary: #8a2be2; 
            --neon-terminal: #00f0ff; 
        }
        
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg-color); color: #f5f5f7; min-height: 100vh; }
        
        header { 
            padding: 20px 40px; 
            border-bottom: 1px solid rgba(255,255,255,0.05); 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .logo { font-size: 24px; font-weight: 600; text-transform: uppercase; text-decoration: none; color: #fff; }
        .nav-actions { display: flex; gap: 20px; }
        .nav-link { color: #999; text-decoration: none; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { color: #fff; }
        
        main { display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        
        /* Кнопки переключения */
        .toggle-container { display: flex; gap: 15px; margin-bottom: 30px; }
        .tab-btn { 
            background: rgba(255,255,255,0.05); 
            border: 1px solid var(--neon-primary); 
            color: #fff; 
            padding: 10px 20px; 
            border-radius: 8px; 
            cursor: pointer; 
            transition: 0.3s; 
        }
        .tab-btn.active { 
            background: var(--neon-primary); 
            box-shadow: 0 0 15px var(--neon-primary); 
        }
        
        /* Контейнеры */
        .tab-content { width: 100%; max-width: 800px; }
        .box { 
            background: var(--surface-color); 
            backdrop-filter: blur(12px); 
            border: 1px solid rgba(255,255,255,0.05); 
            border-bottom: 2px solid rgba(138, 43, 226, 0.4);
            border-radius: 16px; 
            padding: 25px; 
            min-height: 400px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }
        
        /* Стили терминала */
        #guestbook-form { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        #guestbook-form input, #guestbook-form textarea { 
            background: #000; 
            border: 1px solid #333; 
            color: var(--neon-terminal); 
            padding: 12px; 
            font-family: 'Share Tech Mono', monospace; 
            border-radius: 5px; 
            resize: vertical;
        }
        #submit-btn { 
            background: var(--neon-primary); 
            color: #fff; 
            border: none; 
            padding: 12px; 
            cursor: pointer; 
            font-weight: 600; 
            border-radius: 5px; 
            transition: 0.3s;
        }
        #submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        #submit-btn:hover:not(:disabled) { box-shadow: 0 0 10px var(--neon-primary); }
        #status-log { font-family: 'Share Tech Mono', monospace; font-size: 12px; margin-top: 5px; color: #999; }
        
        /* Стили ленты сообщений */
        .message-item {
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 8px;
            font-family: 'Share Tech Mono', monospace;
            word-wrap: break-word;
        }
        .message-header { color: var(--neon-primary); font-weight: bold; margin-bottom: 5px; font-size: 14px; }
        .message-body { color: #e0e0e0; font-size: 15px; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">MacroList</a>
        <div class="nav-actions">
            <a href="index.html" class="nav-link">Каталог</a>
            <a href="forum.html" class="nav-link active">Обсуждение</a>
        </div>
    </header>
    
    <main>
        <!-- Переключатель -->
        <div class="toggle-container">
            <button class="tab-btn active" onclick="switchTab('tg', this)">TELEGRAM ЧАТ</button>
            <button class="tab-btn" onclick="switchTab('term', this)">АНОНИМНЫЙ ТЕРМИНАЛ</button>
        </div>
        
        <!-- Блок Telegram -->
        <div id="tab-tg" class="tab-content">
            <div class="box">
                <!-- Виджет строго настроен на macrolist/19 -->
                <script async src="https://telegram.org/js/telegram-widget.js?22" 
                    data-telegram-discussion="macrolist/19" 
                    data-comments-limit="10" 
                    data-color="8a2be2" 
                    data-dark="1">
                </script>
            </div>
        </div>
        
        <!-- Блок Терминал -->
        <div id="tab-term" class="tab-content" style="display: none;">
            <div class="box">
                <form id="guestbook-form">
                    <input type="text" name="nickname" placeholder="Nickname (Аноним)" maxlength="15" required>
                    <textarea name="message" placeholder="Введите сообщение... (можно прикрепить ссылку на imgur)" maxlength="200" required></textarea>
                    <button type="submit" id="submit-btn">ОТПРАВИТЬ ПАКЕТ</button>
                    <div id="status-log">STATUS: READY_TO_SEND</div>
                </form>
                
                <hr style="border: none; border-top: 1px solid rgba(255,255,255,0.1); margin: 20px 0;">
                
                <!-- Контейнер для вывода сообщений -->
                <div id="messages-list" style="display: flex; flex-direction: column; gap: 15px;">
                    <div style='color: #666; font-family: monospace;'>INITIALIZING_RECEIVER...</div>
                </div>
            </div>
        </div>
    </main>
    
    <script>
        // Переключение вкладок
        function switchTab(tab, btn) {
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tab).style.display = 'block';
            btn.classList.add('active');
            
            // Если открыли терминал, подтягиваем сообщения
            if(tab === 'term') {
                loadMessages();
            }
        }

        // Общая ссылка на Google Apps Script
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwobw-qJ929lw309XkX9ntipq5dmDfSsA3ryEBOQ4TsYiscmj83eAq9jq_hlse_NGZLxg/exec";
        
        // ----------------------------------------------------
        // ЛОГИКА ОТПРАВКИ СООБЩЕНИЯ (POST)
        // ----------------------------------------------------
        const form = document.getElementById('guestbook-form');
        const statusLog = document.getElementById('status-log');
        const submitBtn = document.getElementById('submit-btn');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            
            submitBtn.disabled = true;
            statusLog.innerText = "STATUS: SENDING_PACKET...";
            statusLog.style.color = "#ffaa00"; 
            
            fetch(SCRIPT_URL, { 
                method: 'POST', 
                mode: 'no-cors',
                body: new FormData(form) 
            })
            .then(() => {
                statusLog.innerText = "STATUS: PACKET_SENT_SUCCESSFULLY";
                statusLog.style.color = "#00ff00"; 
                form.reset();
                
                // Задержка перед обновлением ленты, чтобы Google успел записать данные
                setTimeout(() => {
                    loadMessages();
                    statusLog.innerText = "STATUS: READY_TO_SEND"; 
                    statusLog.style.color = "#999"; 
                    submitBtn.disabled = false; 
                }, 2000);
            })
            .catch((err) => { 
                console.error(err);
                statusLog.innerText = "STATUS: ERROR_CONNECTION_FAILED"; 
                statusLog.style.color = "#ff0000"; 
                submitBtn.disabled = false; 
            });
        });

        // ----------------------------------------------------
        // ЛОГИКА ЗАГРУЗКИ СООБЩЕНИЙ (GET)
        // ----------------------------------------------------
        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, tag => ({
                '&': '&amp;', '<': '&lt;', '>': '&gt;', "'": '&#39;', '"': '&quot;'
            }[tag]));
        }

        function loadMessages() {
            const list = document.getElementById('messages-list');
            list.innerHTML = "<div style='color: #666; font-family: monospace;'>DOWNLOADING_PACKETS...</div>";

            fetch(SCRIPT_URL)
                .then(res => res.json())
                .then(data => {
                    list.innerHTML = "";
                    if (data.length === 0) {
                        list.innerHTML = "<div style='color: #666; font-family: monospace;'>NO_PACKETS_FOUND</div>";
                        return;
                    }
                    // Выводим новые сверху (реверс массива)
                    data.reverse().forEach(item => {
                        const safeName = escapeHTML(item.nickname || 'Аноним');
                        const safeMsg = escapeHTML(item.message || '');
                        
                        const msgBox = document.createElement('div');
                        msgBox.className = 'message-item';
                        msgBox.innerHTML = `
                            <div class="message-header">[${safeName}]</div>
                            <div class="message-body">${safeMsg}</div>
                        `;
                        list.appendChild(msgBox);
                    });
                })
                .catch(err => {
                    console.error("Ошибка загрузки:", err);
                    list.innerHTML = "<div style='color: #ff0000; font-family: monospace;'>FAILED_TO_LOAD_MESSAGES. Проверьте функцию doGet в Apps Script.</div>";
                });
        }
    </script>
</body>
</html>
