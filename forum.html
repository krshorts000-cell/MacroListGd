<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MacroList | Обсуждение</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Share+Tech+Mono&display=swap');
        :root { --bg-color: #050505; --surface-color: rgba(18, 18, 18, 0.65); --neon-primary: #8a2be2; --neon-terminal: #00f0ff; }
        body { background: var(--bg-color); color: #f5f5f7; margin: 0; font-family: 'Inter', sans-serif; }
        header { padding: 20px 40px; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; }
        .logo { font-size: 24px; font-weight: 600; text-transform: uppercase; text-decoration: none; color: #fff; }
        .nav-actions { display: flex; gap: 20px; }
        .nav-link { color: #999; text-decoration: none; }
        main { display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        .toggle-container { display: flex; gap: 15px; margin-bottom: 30px; }
        .tab-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--neon-primary); color: #fff; padding: 10px 20px; border-radius: 8px; cursor: pointer; transition: 0.3s; }
        .tab-btn.active { background: var(--neon-primary); box-shadow: 0 0 15px var(--neon-primary); }
        .tab-content { width: 100%; max-width: 800px; }
        .box { background: var(--surface-color); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); border-radius: 16px; padding: 25px; }
        #guestbook-form { display: flex; flex-direction: column; gap: 10px; }
        #guestbook-form input, textarea { background: #000; border: 1px solid #333; color: var(--neon-terminal); padding: 12px; font-family: 'Share Tech Mono', monospace; border-radius: 5px; }
        #submit-btn { background: var(--neon-primary); color: #fff; border: none; padding: 12px; cursor: pointer; font-weight: 600; border-radius: 5px; }
        #status-log { font-family: 'Share Tech Mono', monospace; font-size: 12px; margin-top: 10px; color: #666; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">MacroList</a>
        <div class="nav-actions">
            <a href="index.html" class="nav-link">Каталог</a>
            <a href="forum.html" class="nav-link active">Обсуждение</a>
        </div>
    </header>
    <main>
        <div class="toggle-container">
            <button class="tab-btn active" onclick="switchTab('tg', this)">TELEGRAM ЧАТ</button>
            <button class="tab-btn" onclick="switchTab('term', this)">АНОНИМНЫЙ ТЕРМИНАЛ</button>
        </div>
        <div id="tab-tg" class="tab-content"><div class="box">
            <script async src="https://telegram.org/js/telegram-widget.js?22" data-telegram-discussion="macrolist/1" data-comments-limit="10" data-color="8a2be2" data-dark="1"></script>
        </div></div>
        <div id="tab-term" class="tab-content" style="display: none;"><div class="box">
            <form id="guestbook-form">
                <input type="text" name="nickname" placeholder="Nickname" maxlength="15" required>
                <textarea name="message" placeholder="Введите сообщение..." maxlength="200" required></textarea>
                <button type="submit" id="submit-btn">ОТПРАВИТЬ ПАКЕТ</button>
                <div id="status-log">STATUS: READY_TO_SEND</div>
            </form>
        </div></div>
    </main>
    <script>
        function switchTab(tab, btn) {
            document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('tab-' + tab).style.display = 'block';
            btn.classList.add('active');
        }
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwobw-qJ929lw309XkX9ntipq5dmDfSsA3ryEBOQ4TsYiscmj83eAq9jq_hlse_NGZLxg/exec";
        const form = document.getElementById('guestbook-form');
        const statusLog = document.getElementById('status-log');
        const submitBtn = document.getElementById('submit-btn');

        form.addEventListener('submit', function(e) {
            e.preventDefault();
            submitBtn.disabled = true;
            statusLog.innerText = "STATUS: SENDING_PACKET...";
            fetch(SCRIPT_URL, { method: 'POST', body: new FormData(this) })
            .then(() => {
                statusLog.innerText = "STATUS: PACKET_SENT_SUCCESSFULLY";
                form.reset();
                setTimeout(() => { statusLog.innerText = "STATUS: READY_TO_SEND"; submitBtn.disabled = false; }, 3000);
            }).catch(() => { statusLog.innerText = "STATUS: ERROR_CONNECTION_FAILED"; submitBtn.disabled = false; });
        });
    </script>
</body>
</html>
